function updateDocTipo(){
  const t=document.getElementById('o-doc-tipo');
  const wrap=document.getElementById('o-doc-num-wrap');
  const lbl=document.getElementById('o-doc-num-label');
  if(!t||!wrap) return;
  if(t.value==='ninguno'){
    wrap.style.display='none';
  } else {
    wrap.style.display='block';
    if(lbl) lbl.textContent = t.value==='remito' ? 'N° de Remito' : 'N° de Carta de Porte';
  }
}

// Renderiza el selector "Agregar establecimiento"
function renderAgregarEstab(){
  const cont=document.getElementById('agregar-estab-wrap');
  if(!cont) return;
  // Establecimientos disponibles: los que están en S.establecimientos y todavía no fueron agregados a la orden
  const usados=new Set(ordenBloques.map(b=>b.estabNombre));
  const disp=S.establecimientos.filter(e=>!usados.has(e));

  if(S.establecimientos.length===0){
    cont.innerHTML='<div style="background:var(--surface);border:1px dashed var(--border);border-radius:8px;padding:12px;text-align:center;font-size:13px;color:var(--muted)">Sin establecimientos cargados — cargá uno desde el módulo 🗺️ U.P.</div>';
    return;
  }
  if(disp.length===0){
    cont.innerHTML='<div style="font-size:12px;color:var(--muted)">✓ Todos los establecimientos fueron agregados</div>';
    return;
  }

  const opts=disp.map(e=>`<option value="${esc(e)}">${esc(e)}</option>`).join('');
  cont.innerHTML=`
    <div style="display:flex;gap:8px">
      <select id="agregar-estab-sel" style="flex:1">
        <option value="">— Seleccionar establecimiento —</option>
        ${opts}
      </select>
      <button class="btn-primary btn-sm" onclick="agregarBloqueEstab()">+ Agregar</button>
    </div>`;
}

function agregarBloqueEstab(){
  const sel=document.getElementById('agregar-estab-sel');
  if(!sel||!sel.value) return toast('Seleccioná un establecimiento','warn');
  ordenBloques.push({estabNombre:sel.value, lotes:new Set(), itemsPorLote:{}});
  renderAgregarEstab();
  renderBloques();
}

function quitarBloqueEstab(idx){
  // Quitar también las superficies override de los lotes de ese bloque
  const b=ordenBloques[idx];
  if(b){
    for(const lid of b.lotes) delete lotesSuperficies[lid];
  }
  ordenBloques.splice(idx,1);
  renderAgregarEstab();
  renderBloques();
}

// Renderiza todos los bloques de establecimientos
function renderBloques(){
  const cont=document.getElementById('ordenes-bloques');
  if(!cont) return;
  if(ordenBloques.length===0){
    cont.innerHTML='<div style="background:var(--surface);border:1px dashed var(--border);border-radius:8px;padding:20px;text-align:center;font-size:13px;color:var(--muted);margin-bottom:14px">📌 Agregá al menos un establecimiento para empezar la orden</div>';
    actualizarTotales();
    return;
  }
  cont.innerHTML = ordenBloques.map((b,bi)=>renderBloque(b,bi)).join('');
  actualizarTotales();
}

function renderBloque(bloque, bi){
  // Lotes disponibles (de ese establecimiento, que todavía no están seleccionados)
  const lotesEstab = S.lotes.filter(l=>l.establecimiento===bloque.estabNombre);
  const lotesDisp = lotesEstab.filter(l=>!bloque.lotes.has(l.id));
  const lotesSel = lotesEstab.filter(l=>bloque.lotes.has(l.id));

  // Asegurar que itemsPorLote existe
  if (!bloque.itemsPorLote) bloque.itemsPorLote = {};

  // Calcular superficie de este bloque
  let supBloque=0;
  for(const lid of bloque.lotes){
    const l=S.lotes.find(x=>x.id===lid);
    if(!l) continue;
    supBloque += lotesSuperficies[lid]!==undefined ? Number(lotesSuperficies[lid]) : Number(l.cantidad);
  }

  // Chips de lotes disponibles
  const chipsDisp = lotesDisp.length>0
    ? `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">${lotesDisp.map(l=>`<div class="lote-chip" onclick="addLoteToBloque(${bi},'${l.id}')">${esc(l.nombre)} <span class="mono" style="font-size:10px;color:var(--muted)">${l.cantidad} ${esc(l.unidad||'')}</span></div>`).join('')}</div>`
    : (lotesEstab.length===0
        ? '<div style="font-size:12px;color:var(--muted);margin-bottom:10px;font-style:italic">Este establecimiento no tiene U.P. cargadas</div>'
        : '<div style="font-size:12px;color:var(--muted);margin-bottom:10px">✓ Todas las U.P. de este establecimiento están seleccionadas</div>');

  // Lista de lotes seleccionados con superficie + sus propios insumos
  const selList = lotesSel.map(l=>{
    const supActual = lotesSuperficies[l.id]!==undefined ? lotesSuperficies[l.id] : l.cantidad;
    const isOverride = lotesSuperficies[l.id]!==undefined && Number(lotesSuperficies[l.id])!==Number(l.cantidad);
    if (!bloque.itemsPorLote[l.id]) bloque.itemsPorLote[l.id] = [];
    const items = bloque.itemsPorLote[l.id];

    // Render de los items de este lote
    const itemsHtml = items.map((it, ii) => {
      const insOpts = S.insumos.slice().sort((a,b)=>a.nombre.localeCompare(b.nombre)).map(i=>`<option value="${i.id}"${it.insumoId===i.id?' selected':''}>${esc(i.nombre)}${i.categoria?' — '+esc(i.categoria):''} (stock: ${fmtN(i.stockEstab)} ${esc(i.unidad)})</option>`).join('');
      const ins = S.insumos.find(x=>x.id===it.insumoId);
      const u = ins ? ins.unidad : '';
      return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px;margin-bottom:4px">
        <div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:4px">
          <select style="flex:1;font-size:11px;padding:4px 6px" onchange="updateLoteItem(${bi},'${l.id}',${ii},'insumoId',this.value)">
            <option value="">— Insumo —</option>${insOpts}
          </select>
          <button class="btn-sm btn-danger" onclick="removeLoteItem(${bi},'${l.id}',${ii})" style="padding:2px 6px;font-size:11px">✕</button>
        </div>
        <div style="display:flex;gap:6px;align-items:center;font-size:11px">
          <input type="number" step="0.01" value="${it.dosis||''}" placeholder="Dosis" style="flex:1;padding:4px 6px;font-size:11px" oninput="updateLoteItem(${bi},'${l.id}',${ii},'dosis',this.value)">
          <span style="color:var(--muted);min-width:60px">${u?u+' / ha':'/ ha'}</span>
        </div>
      </div>`;
    }).join('');

    return `<div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:6px;margin-bottom:8px">
        <b style="font-size:13px;color:var(--accent)">📍 ${esc(l.nombre)}</b>
        <button class="btn-sm btn-danger" onclick="removeLoteFromBloque(${bi},'${l.id}')">✕</button>
      </div>
      <div style="display:flex;gap:6px;align-items:center;font-size:12px;margin-bottom:8px">
        <span style="font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700">Superficie:</span>
        <input type="number" step="0.01" value="${supActual}" style="flex:1;padding:5px 8px;font-size:12px"
          oninput="updateSupBloque('${l.id}', this.value, ${bi})">
        <span style="color:var(--muted)">${esc(l.unidad||'')}</span>
        ${isOverride?`<span class="badge mono" style="background:var(--warn)22;color:var(--warn);border:1px solid var(--warn)44;font-size:10px">Modif.</span>`:''}
      </div>
      ${isOverride?`<div style="font-size:10px;color:var(--muted);margin-bottom:6px">U.P. completa: ${fmtN(l.cantidad)} ${esc(l.unidad||'')} · <a onclick="resetSupBloque('${l.id}', ${bi})" style="color:var(--accent);cursor:pointer;text-decoration:underline">Restablecer</a></div>`:''}
      <div style="border-top:1px dashed var(--border);padding-top:6px;margin-top:4px">
        <div class="row-between" style="margin-bottom:4px">
          <div style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em">📦 Insumos para esta U.P.</div>
          <button class="btn-sm btn-secondary" onclick="addLoteItem(${bi},'${l.id}')" style="padding:2px 8px;font-size:11px">+ Insumo</button>
        </div>
        ${itemsHtml || '<div style="font-size:11px;color:var(--muted);font-style:italic;padding:4px 0">Sin insumos para esta U.P.</div>'}
      </div>
    </div>`;
  }).join('');

  return `<div class="card" style="margin-bottom:14px;border:1.5px solid var(--accent);padding:14px">
    <div class="row-between" style="margin-bottom:10px">
      <div style="font-size:14px;font-weight:800;color:var(--accent)">🏡 ${esc(bloque.estabNombre)}</div>
      <button class="btn-sm btn-danger" onclick="quitarBloqueEstab(${bi})">✕ Quitar</button>
    </div>

    <!-- U.P. -->
    <div style="margin-bottom:14px">
      <div style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">📍 Agregá unidades productivas</div>
      ${chipsDisp}
      ${selList}
      ${lotesSel.length>0?`<div style="font-size:11px;color:var(--muted);margin-top:4px">Total a trabajar en este establecimiento: <span class="mono" style="color:var(--accent);font-weight:700">${fmtN(supBloque)} ha</span></div>`:''}
    </div>
  </div>`;
}

function addLoteToBloque(bi, loteId){
  const b=ordenBloques[bi];
  if(!b) return;
  b.lotes.add(loteId);
  if (!b.itemsPorLote) b.itemsPorLote = {};
  if (!b.itemsPorLote[loteId]) b.itemsPorLote[loteId] = [];
  renderBloques();
}

function updateSupBloque(loteId, val, bi){
  const num=parseFloat(val);
  const lote=S.lotes.find(x=>x.id===loteId);
  if(!lote) return;
  if(isNaN(num) || num<=0){
    delete lotesSuperficies[loteId];
  } else {
    lotesSuperficies[loteId]=num;
  }
  actualizarTotales();
}

function resetSupBloque(loteId, bi){
  delete lotesSuperficies[loteId];
  renderBloques();
}

function removeLoteFromBloque(bi, loteId){
  const b=ordenBloques[bi];
  if(!b) return;
  b.lotes.delete(loteId);
  delete lotesSuperficies[loteId];
  if (b.itemsPorLote) delete b.itemsPorLote[loteId];
  renderBloques();
}

function addLoteItem(bi, loteId){
  const b = ordenBloques[bi];
  if (!b) return;
  if (!b.itemsPorLote) b.itemsPorLote = {};
  if (!b.itemsPorLote[loteId]) b.itemsPorLote[loteId] = [];
  b.itemsPorLote[loteId].push({insumoId:'', dosis:''});
  renderBloques();
}

function removeLoteItem(bi, loteId, ii){
  const b = ordenBloques[bi];
  if (!b || !b.itemsPorLote || !b.itemsPorLote[loteId]) return;
  b.itemsPorLote[loteId].splice(ii, 1);
  renderBloques();
}

function updateLoteItem(bi, loteId, ii, field, val){
  const b = ordenBloques[bi];
  if (!b || !b.itemsPorLote || !b.itemsPorLote[loteId] || !b.itemsPorLote[loteId][ii]) return;
  b.itemsPorLote[loteId][ii][field] = val;
  if (field === 'insumoId'){
    renderBloques();
  } else {
    actualizarTotales();
  }
}


// Eliminar una orden con devolución de stock
async function eliminarOrden(id){
  const o = S.ordenes.find(x => x.id === id);
  if (!o) return;
  if (!await confirmar(`¿Enviar la orden ${o.numero} de ${o.contratista} a la papelera? Se devolverán al stock todos los insumos descontados. Podrás recuperarla desde 🗑️ Papelera.`)) return;

  // Calcular cuánto stock devolver por insumo
  const devoluciones = {};  // {insumoId: cantidad}
  if (o.bloques && o.bloques.length > 0){
    for (const b of o.bloques){
      for (const item of b.items){
        if (!item.insumoId) continue;
        devoluciones[item.insumoId] = (devoluciones[item.insumoId] || 0) + Number(item.cantidad);
      }
    }
  } else if (o.items && o.items.length > 0){
    // Compatibilidad con órdenes viejas
    for (const item of o.items){
      if (!item.insumoId) continue;
      devoluciones[item.insumoId] = (devoluciones[item.insumoId] || 0) + Number(item.cantidad);
    }
  }

  // Aplicar devoluciones al stock del establecimiento
  S.insumos = S.insumos.map(ins => {
    if (devoluciones[ins.id]){
      return { ...ins, stockEstab: Number(ins.stockEstab) + devoluciones[ins.id] };
    }
    return ins;
  });

  // Registrar movimientos de devolución (uno por insumo) para trazabilidad
  for (const insId in devoluciones){
    const ins = S.insumos.find(x => x.id === insId);
    if (!ins) continue;
    S.movimientos = [{
      id: uid(),
      fecha: now(),
      insumoId: insId,
      insumoNombre: ins.nombre,
      tipo: 'ingreso_estab',
      cantidad: devoluciones[insId],
      unidad: ins.unidad,
      nota: `Devolución por eliminación de orden ${o.numero}`
    }, ...S.movimientos];
  }

  // Si tenía remito asociado, lo eliminamos también
  if (o.documento && o.documento.tipo === 'remito'){
    S.remitos = S.remitos.filter(r => !(r.numero === o.documento.numero && (r.proveedor||'').includes(`Orden ${o.numero}`)));
  }

  // Mover a papelera (después de devolver el stock)
  moverAPapelera('orden', o);

  // Eliminar la orden de la lista activa
  S.ordenes = S.ordenes.filter(x => x.id !== id);
  saveState();
  render();
  toast(`Orden enviada a papelera — Stock restablecido ✓`);
}

// Actualiza el resumen consolidado de la orden
function actualizarTotales(){
  const cont=document.getElementById('resumen-totales');
  const inner=document.getElementById('totales-content');
  if(!cont||!inner) return;

  // Calcular totales por bloque y consolidados
  const consolidado={};  // {insumoId: {nombre, unidad, total}}
  const detalleBloques=[];  // [{estabNombre, supTotal, items:[{nombre,unidad,dosis,total,stockOK}]}]
  let supGlobal=0;
  let hayDatos=false;

  for(const b of ordenBloques){
    let supBloque=0;
    for(const lid of b.lotes){
      const l=S.lotes.find(x=>x.id===lid);
      if(!l) continue;
      supBloque += lotesSuperficies[lid]!==undefined ? Number(lotesSuperficies[lid]) : Number(l.cantidad);
    }
    supGlobal += supBloque;

    const lotesDetalle=[];  // [{loteNombre, supLote, items:[...]}]

    // Iterar por cada U.P. del bloque
    for (const lid of b.lotes){
      const lote = S.lotes.find(x => x.id === lid);
      if (!lote) continue;
      const supLote = lotesSuperficies[lid]!==undefined ? Number(lotesSuperficies[lid]) : Number(lote.cantidad);
      const items = (b.itemsPorLote && b.itemsPorLote[lid]) ? b.itemsPorLote[lid] : [];
      const itemsLote = [];
      for (const it of items){
        const dosis = parseFloat(it.dosis);
        if (!it.insumoId || !dosis || dosis <= 0) continue;
        const ins = S.insumos.find(x => x.id === it.insumoId);
        if (!ins) continue;
        const total = dosis * supLote;
        itemsLote.push({insumoId:it.insumoId,nombre:ins.nombre,categoria:ins.categoria||'',unidad:ins.unidad,dosis,total});
        // Acumular en consolidado
        if (!consolidado[it.insumoId]){
          consolidado[it.insumoId] = {nombre:ins.nombre, categoria:ins.categoria||'', unidad:ins.unidad, total:0, stockEstab:Number(ins.stockEstab)};
        }
        consolidado[it.insumoId].total += total;
        hayDatos = true;
      }
      if (itemsLote.length > 0){
        lotesDetalle.push({loteNombre:lote.nombre, supLote, unidad:lote.unidad||'ha', items:itemsLote});
      }
    }

    if (b.lotes.size > 0 || lotesDetalle.length > 0){
      detalleBloques.push({estabNombre:b.estabNombre, supTotal:supBloque, lotesDetalle});
    }
  }

  if(!hayDatos){
    cont.style.display='none';
    return;
  }

  // Verificar stock contra el consolidado
  const filasConsol = Object.values(consolidado).map(c=>{
    return {...c, stockOK: c.total <= c.stockEstab};
  });

  cont.style.display='block';

  // Detalle por establecimiento → por lote → insumos
  const detalleHtml = detalleBloques.map(b=>{
    if(b.lotesDetalle.length===0) return '';
    const lotesHtml = b.lotesDetalle.map(ld=>`<div style="margin-top:6px;padding:6px;background:var(--surface);border-radius:4px">
      <div style="font-size:11px;color:var(--accent);font-weight:600;margin-bottom:4px">📍 ${esc(ld.loteNombre)} <span style="color:var(--muted);font-weight:400">(${fmtN(ld.supLote)} ${esc(ld.unidad||'')})</span></div>
      ${ld.items.map(it=>`<div style="display:flex;justify-content:space-between;font-size:11px;padding:1px 0">
        <span>${esc(it.nombre)}${it.categoria?` <span style="font-size:10px;color:var(--muted)">— ${esc(it.categoria)}</span>`:''}</span>
        <span class="mono" style="color:var(--muted)">${fmtN(it.dosis)} ${esc(it.unidad)}/ha · <b style="color:var(--text)">${fmtN(it.total)} ${esc(it.unidad)}</b></span>
      </div>`).join('')}
    </div>`).join('');
    return `<div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:8px">
      <div style="font-size:11px;color:var(--accent);font-weight:700;margin-bottom:6px">🏡 ${esc(b.estabNombre)} <span style="color:var(--muted);font-weight:400;font-size:10px">— ${fmtN(b.supTotal)} ha</span></div>
      ${lotesHtml}
    </div>`;
  }).join('');

  // Tabla consolidada
  const tablaConsol = `<div style="font-size:11px;color:var(--accent);font-weight:700;margin:10px 0 6px">📊 Total general necesario</div>
    <table style="width:100%;font-size:13px">
      <thead><tr>
        <th style="text-align:left;padding:6px;font-size:10px">Insumo</th>
        <th style="text-align:right;padding:6px;font-size:10px">Total</th>
        <th style="text-align:right;padding:6px;font-size:10px">Stock</th>
      </tr></thead>
      <tbody>
        ${filasConsol.map(f=>`<tr>
          <td style="padding:6px;border-bottom:1px solid var(--border)"><b>${esc(f.nombre)}</b>${f.categoria?`<br><span style="font-size:10px;color:var(--muted)">${esc(f.categoria)}</span>`:''}</td>
          <td class="mono" style="text-align:right;padding:6px;border-bottom:1px solid var(--border);font-weight:700;color:${f.stockOK?'var(--accent)':'var(--danger)'}">${fmtN(f.total)} ${esc(f.unidad)}</td>
          <td class="mono" style="text-align:right;padding:6px;border-bottom:1px solid var(--border);font-size:11px;color:${f.stockOK?'var(--muted)':'var(--danger)'}">${f.stockOK?'✓':'✗'} ${fmtN(f.stockEstab)}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;

  inner.innerHTML = `
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px">Superficie total de la orden: <span class="mono" style="color:var(--accent);font-weight:700">${fmtN(supGlobal)} ha</span></div>
    ${detalleHtml}
    ${tablaConsol}
    ${filasConsol.some(f=>!f.stockOK)?`<div style="margin-top:10px;padding:8px;background:rgba(224,85,85,.1);border-left:3px solid var(--danger);border-radius:4px;font-size:12px;color:var(--danger)">⚠️ Stock insuficiente en uno o más insumos. Revisá las cantidades.</div>`:''}`;
}

function saveNewOrden(){
  const contratista=document.getElementById('o-cont').value;
  const fecha=document.getElementById('o-fecha').value;
  if(!contratista) return toast('Seleccioná un contratista','warn');
  if(ordenBloques.length===0) return toast('Agregá al menos un establecimiento','warn');

  // Validar documento
  const docTipo=document.getElementById('o-doc-tipo').value;
  let docNum='';
  if(docTipo!=='ninguno'){
    docNum=document.getElementById('o-doc-num').value.trim();
    if(!docNum){
      const lbl = docTipo==='remito' ? 'N° de Remito' : 'N° de Carta de Porte';
      return toast(`Ingresá el ${lbl}`,'warn');
    }
  }

  // Validar que cada bloque tenga al menos una U.P.
  for(const b of ordenBloques){
    if(b.lotes.size===0){
      return toast(`El establecimiento "${b.estabNombre}" no tiene U.P. seleccionadas`,'warn');
    }
  }

  // Si estamos editando, calcular el stock que se devolvería al "deshacer" la orden original.
  // Esto se usa para validación de stock ANTES de aplicar cambios.
  const ordenAnterior = editandoOrdenId ? S.ordenes.find(x => x.id === editandoOrdenId) : null;
  const stockDevueltoVirtual = {};  // {insumoId: cantidad que se devolvería al deshacer}
  if (ordenAnterior){
    if (ordenAnterior.bloques && ordenAnterior.bloques.length > 0){
      for (const b of ordenAnterior.bloques){
        for (const item of b.items){
          if (!item.insumoId) continue;
          stockDevueltoVirtual[item.insumoId] = (stockDevueltoVirtual[item.insumoId] || 0) + Number(item.cantidad);
        }
      }
    } else if (ordenAnterior.items && ordenAnterior.items.length > 0){
      for (const item of ordenAnterior.items){
        if (!item.insumoId) continue;
        stockDevueltoVirtual[item.insumoId] = (stockDevueltoVirtual[item.insumoId] || 0) + Number(item.cantidad);
      }
    }
  }

  // Construir bloques con detalle calculado
  const bloquesData=[];
  let supGlobal=0;
  const consolidadoStock={};  // {insumoId: cantidadTotal}

  for(const b of ordenBloques){
    if (!b.itemsPorLote) b.itemsPorLote = {};

    // Detalle de superficies por lote + sus insumos
    const lotesDetalle = [...b.lotes].map(id=>{
      const l=S.lotes.find(x=>x.id===id);
      const supAplicada = lotesSuperficies[id]!==undefined ? Number(lotesSuperficies[id]) : Number(l.cantidad);

      // Items de este lote
      const itemsLote = [];
      const itemsRaw = b.itemsPorLote[id] || [];
      for (const it of itemsRaw){
        const dosis = parseFloat(it.dosis);
        if (!it.insumoId || !dosis || dosis <= 0) continue;
        const ins = S.insumos.find(x=>x.id===it.insumoId);
        if (!ins) continue;
        const cantidadTotal = dosis * supAplicada;
        itemsLote.push({id:uid(), insumoId:it.insumoId, dosis, cantidad:cantidadTotal, unidad:ins.unidad});
        consolidadoStock[it.insumoId] = (consolidadoStock[it.insumoId] || 0) + cantidadTotal;
      }

      return {id, supAplicada, supOriginal:Number(l.cantidad), items:itemsLote};
    });
    const supBloque = lotesDetalle.reduce((a,x)=>a+x.supAplicada, 0);
    supGlobal += supBloque;

    // Items planos del bloque (suma de todos los items de cada lote, para compatibilidad)
    const itemsBloque = lotesDetalle.flatMap(ld => ld.items);

    bloquesData.push({estabNombre:b.estabNombre, lotes:[...b.lotes], lotesDetalle, supTotal:supBloque, items:itemsBloque});
  }

  // Verificar stock global contra consolidado
  // Si estamos editando, sumamos el stock que se devolvería al deshacer la orden vieja
  for(const insId in consolidadoStock){
    const ins=S.insumos.find(x=>x.id===insId);
    if(!ins) continue;
    const stockDisponible = Number(ins.stockEstab) + (stockDevueltoVirtual[insId] || 0);
    if(consolidadoStock[insId] > stockDisponible){
      return toast(`Stock insuficiente: ${ins.nombre} (necesita ${fmtN(consolidadoStock[insId])} ${ins.unidad}, hay ${fmtN(stockDisponible)})`,'danger');
    }
  }

  // Generar número de orden (o usar el original si estamos editando)
  const ordenNumero = editandoOrdenId ? editandoOrdenNumero : ('OT-'+String(S.ordenes.length+1).padStart(4,'0'));

  // Texto del documento
  let docTxt='';
  if(docTipo==='remito') docTxt=`Remito ${docNum}`;
  else if(docTipo==='carta') docTxt=`Carta de Porte ${docNum}`;

  // === SI ESTAMOS EDITANDO: primero deshacemos los efectos de la orden vieja ===
  if (ordenAnterior){
    // 1) Devolver el stock viejo
    S.insumos = S.insumos.map(ins => {
      if (stockDevueltoVirtual[ins.id]){
        return { ...ins, stockEstab: Number(ins.stockEstab) + stockDevueltoVirtual[ins.id] };
      }
      return ins;
    });
    // 2) Eliminar remitos asociados a la orden vieja (si los tenía)
    if (ordenAnterior.documento && ordenAnterior.documento.tipo === 'remito'){
      S.remitos = S.remitos.filter(r => !(r.numero === ordenAnterior.documento.numero && (r.proveedor||'').includes(`Orden ${ordenAnterior.numero}`)));
    }
    // 3) Eliminar la orden vieja del listado (la vamos a recrear más abajo)
    S.ordenes = S.ordenes.filter(x => x.id !== editandoOrdenId);
  }

  // Descontar stock y registrar movimientos (uno por bloque, por lote, por insumo, para trazabilidad)
  const updates={};
  const movs=[];
  for(const b of bloquesData){
    for(const ld of b.lotesDetalle){
      const lote = S.lotes.find(x=>x.id===ld.id);
      const loteName = lote ? lote.nombre : '(U.P.)';
      for(const item of ld.items){
        const ins=S.insumos.find(x=>x.id===item.insumoId);
        if(!ins) continue;
        updates[ins.id]=(updates[ins.id]!==undefined?updates[ins.id]:Number(ins.stockEstab))-item.cantidad;
        const notaBase=`Orden ${ordenNumero} - ${contratista} · 🏡 ${b.estabNombre} · 📍 ${loteName} (${fmtN(item.dosis)} ${ins.unidad}/ha × ${fmtN(ld.supAplicada)} ha)`;
        const notaCompleta=docTxt?`${notaBase} - ${docTxt}`:notaBase;
        movs.push({id:uid(),fecha:now(),insumoId:ins.id,insumoNombre:ins.nombre,tipo:'uso_estab',cantidad:item.cantidad,unidad:ins.unidad,nota:notaCompleta});
      }
    }
  }

  // Si es Remito, registrarlo también en S.remitos
  if(docTipo==='remito'){
    for(const b of bloquesData){
      for(const ld of b.lotesDetalle){
        const lote = S.lotes.find(x=>x.id===ld.id);
        const loteName = lote ? lote.nombre : '(U.P.)';
        for(const item of ld.items){
          const ins=S.insumos.find(x=>x.id===item.insumoId);
          if(!ins) continue;
          S.remitos=[{id:uid(),fecha,numero:docNum,proveedor:`Salida — Orden ${ordenNumero} (${b.estabNombre} - ${loteName})`,insumoId:ins.id,insumoNombre:ins.nombre,cantidad:item.cantidad,unidad:ins.unidad,creadoEn:now()},...S.remitos];
        }
      }
    }
  }

  // Construir lista plana de lotes (para compatibilidad con render existente)
  const todosLosLotes = bloquesData.flatMap(b=>b.lotes);
  const todosLosLotesDetalle = bloquesData.flatMap(b=>b.lotesDetalle);
  const todosLosItems = bloquesData.flatMap(b=>b.items);

  const orden={
    id: editandoOrdenId || uid(),
    numero:ordenNumero,
    contratista, fecha,
    bloques: bloquesData,
    lotes: todosLosLotes,
    lotesDetalle: todosLosLotesDetalle,
    descripcion:document.getElementById('o-desc').value.trim(),
    items: todosLosItems,
    superficieTotal: supGlobal,
    documento: docTipo!=='ninguno' ? {tipo:docTipo, numero:docNum} : null,
    fechaCreacion: editandoOrdenId ? (window._editOrigData?.fechaCreacion || now()) : now()
  };

  const eraEdicion = !!editandoOrdenId;
  S.insumos=S.insumos.map(x=>updates[x.id]!==undefined?{...x,stockEstab:updates[x.id]}:x);
  S.ordenes=[orden, ...S.ordenes];
  S.movimientos=[...movs, ...S.movimientos];
  ordenBloques=[];
  lotesSuperficies={};
  editandoOrdenId = null;
  editandoOrdenNumero = null;
  window._editOrigData = null;
  saveState(); closeModal(); render();
  toast(eraEdicion ? 'Orden actualizada ✓' : 'Orden creada ✓ — Stock actualizado');
}

// Genera el HTML completo del PDF para una orden
function generarOrdenHTML(o){
  const cont=S.contratistas.find(x=>x.nombre===o.contratista)||{};
  const supTotal = o.superficieTotal!==undefined ? o.superficieTotal : 0;

  // Detalle por establecimiento (bloques)
  let detalleHtml='';
  // Acumular insumos consolidados
  const consolidado={};

  if(o.bloques && o.bloques.length>0){
    detalleHtml = o.bloques.map(b=>{
      // Detectar si la orden usa la estructura nueva (items por lote)
      const usaItemsPorLote = b.lotesDetalle && b.lotesDetalle.some(ld => ld.items && ld.items.length > 0);

      if (usaItemsPorLote){
        // NUEVA ESTRUCTURA: cada lote tiene sus propios insumos
        const lotesHtml = b.lotesDetalle.map(ld=>{
          const l = S.lotes.find(x=>x.id===ld.id);
          const loteNom = l ? l.nombre : '(U.P. eliminada)';
          const isOverride = ld.supAplicada !== ld.supOriginal;
          const supTxt = isOverride
            ? `${fmtN(ld.supAplicada)} ${l?l.unidad||'':''} (de ${fmtN(ld.supOriginal)})`
            : `${fmtN(ld.supAplicada)} ${l?l.unidad||'':''}`;
          const itemsRows = (ld.items || []).map(it => {
            const ins = S.insumos.find(x=>x.id===it.insumoId);
            const nom = ins ? ins.nombre : '(insumo eliminado)';
            const cat = ins ? ins.categoria : '';
            // Acumular en consolidado
            if (!consolidado[it.insumoId]){
              consolidado[it.insumoId] = {nombre:nom, categoria:cat, unidad:it.unidad, total:0};
            }
            consolidado[it.insumoId].total += Number(it.cantidad);
            return `<tr>
              <td style="padding:6px 10px;border:1px solid #ccc">${nom}${cat?` <span style="font-size:11px;color:#666">— ${cat}</span>`:''}</td>
              <td style="padding:6px 10px;border:1px solid #ccc;text-align:right">${fmtN(it.dosis)} ${it.unidad}/ha</td>
              <td style="padding:6px 10px;border:1px solid #ccc;text-align:right;font-weight:bold">${fmtN(it.cantidad)} ${it.unidad}</td>
            </tr>`;
          }).join('');
          return `<div style="margin-bottom:14px;padding-left:10px;border-left:2px solid #888">
            <div style="font-size:13px;font-weight:bold;margin-bottom:6px">📍 ${loteNom} <span style="font-weight:normal;color:#666;font-size:12px">— ${supTxt}</span></div>
            ${itemsRows?`<table>
              <thead><tr><th>Insumo</th><th style="text-align:right">Dosis</th><th style="text-align:right">Cantidad</th></tr></thead>
              <tbody>${itemsRows}</tbody>
            </table>`:'<div style="font-size:12px;color:#999;font-style:italic">Sin insumos</div>'}
          </div>`;
        }).join('');
        return `<div style="margin-bottom:20px;border-left:3px solid #444;padding-left:12px">
          <div style="font-size:14px;font-weight:bold;margin-bottom:8px">🏡 ${b.estabNombre} <span style="font-weight:normal;color:#666;font-size:12px">— ${fmtN(b.supTotal)} ha</span></div>
          ${lotesHtml}
        </div>`;
      }

      // ESTRUCTURA VIEJA: items compartidos por todos los lotes del bloque
      const lotesRows = b.lotes.map(lid=>{
        const l=S.lotes.find(x=>x.id===lid);
        if(!l) return '';
        const det = b.lotesDetalle?.find(d=>d.id===lid);
        const supAplicada = det ? det.supAplicada : Number(l.cantidad);
        const isOverride = det && det.supAplicada!==det.supOriginal;
        return `<tr>
          <td style="padding:6px 10px;border:1px solid #ccc">${l.nombre}</td>
          <td style="padding:6px 10px;border:1px solid #ccc">${l.tipo||'—'}</td>
          <td style="padding:6px 10px;border:1px solid #ccc;text-align:right">${fmtN(supAplicada)} ${l.unidad||''}${isOverride?` <span style="color:#888;font-size:11px">(de ${fmtN(det.supOriginal)})</span>`:''}</td>
        </tr>`;
      }).join('');
      const itemsRows = b.items.map(it=>{
        const ins=S.insumos.find(x=>x.id===it.insumoId);
        const nom=ins?ins.nombre:'(insumo eliminado)';
        const cat=ins?ins.categoria:'';
        // Acumular en consolidado
        if(!consolidado[it.insumoId]){
          consolidado[it.insumoId]={nombre:nom,categoria:cat,unidad:it.unidad,total:0};
        }
        consolidado[it.insumoId].total += Number(it.cantidad);
        return `<tr>
          <td style="padding:6px 10px;border:1px solid #ccc">${nom}${cat?` <span style="font-size:11px;color:#666">— ${cat}</span>`:''}</td>
          <td style="padding:6px 10px;border:1px solid #ccc;text-align:right">${fmtN(it.dosis)} ${it.unidad}/ha</td>
          <td style="padding:6px 10px;border:1px solid #ccc;text-align:right;font-weight:bold">${fmtN(it.cantidad)} ${it.unidad}</td>
        </tr>`;
      }).join('');
      return `
        <div style="margin-bottom:20px;border-left:3px solid #444;padding-left:12px">
          <div style="font-size:14px;font-weight:bold;margin-bottom:8px">🏡 ${b.estabNombre} <span style="font-weight:normal;color:#666;font-size:12px">— ${fmtN(b.supTotal)} ha</span></div>
          <table>
            <thead><tr><th>Unidad Productiva</th><th>Tipo</th><th style="text-align:right">Superficie</th></tr></thead>
            <tbody>${lotesRows}</tbody>
          </table>
          ${itemsRows?`
          <table>
            <thead><tr><th>Insumo</th><th style="text-align:right">Dosis</th><th style="text-align:right">Cantidad total</th></tr></thead>
            <tbody>${itemsRows}</tbody>
          </table>`:''}
        </div>`;
    }).join('');
  } else {
    // Compatibilidad con órdenes viejas
    const lotesData=S.lotes.filter(l=>o.lotes?.includes(l.id));

// Genera un elemento DOM con el contenido de la orden (oculto, fuera de pantalla)
function crearElementoOrden(o){
  const wrapper=document.createElement('div');
  wrapper.style.cssText='position:fixed;left:-9999px;top:0;width:700px;background:#fff;color:#000;padding:32px;font-family:Arial,sans-serif';
  // Reusar el HTML completo (extraer solo el contenido del body)
  const fullHtml = generarOrdenHTML(o);
  const match = fullHtml.match(/<body>([\s\S]*?)<\/body>/);
  wrapper.innerHTML = match ? match[1] : '';
  return wrapper;
}

// Genera el PDF como Blob usando jsPDF y html2canvas
async function generarPDFBlob(o){
  if(!window.jspdf||!window.html2canvas){
    throw new Error('Librerías de PDF no cargadas');
  }
  const el=crearElementoOrden(o);
  document.body.appendChild(el);
  try{
    const canvas=await html2canvas(el,{scale:2,backgroundColor:'#ffffff',logging:false});
    const imgData=canvas.toDataURL('image/jpeg',0.95);
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF('p','mm','a4');
    const pageWidth=pdf.internal.pageSize.getWidth();
    const pageHeight=pdf.internal.pageSize.getHeight();
    const imgWidth=pageWidth;
    const imgHeight=(canvas.height*imgWidth)/canvas.width;
    let heightLeft=imgHeight;
    let position=0;
    pdf.addImage(imgData,'JPEG',0,position,imgWidth,imgHeight);
    heightLeft-=pageHeight;
    while(heightLeft>0){
      position=heightLeft-imgHeight;
      pdf.addPage();
      pdf.addImage(imgData,'JPEG',0,position,imgWidth,imgHeight);
      heightLeft-=pageHeight;
    }
    return pdf.output('blob');
  } finally {
    document.body.removeChild(el);
  }
}

async function descargarOrdenPDF(id){
  const o=S.ordenes.find(x=>x.id===id);if(!o)return;
  toast('Generando PDF...');
  try{
    const blob=await generarPDFBlob(o);
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`Orden_${o.numero}.pdf`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    closeModal();
    toast('PDF descargado ✓');
  }catch(e){
    toast('Error al generar PDF: '+e.message,'danger');
  }
}

async function compartirOrdenPDF(id){
  const o=S.ordenes.find(x=>x.id===id);if(!o)return;
  toast('Preparando para compartir...');
  try{
    const blob=await generarPDFBlob(o);
    const file=new File([blob],`Orden_${o.numero}.pdf`,{type:'application/pdf'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({
        files:[file],
        title:`Orden ${o.numero}`,
        text:`Orden de trabajo ${o.numero} - ${o.contratista}`
      });
      closeModal();
    } else {
      // Fallback: descargar
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;
      a.download=`Orden_${o.numero}.pdf`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url),1000);
      closeModal();
      toast('Tu navegador no permite compartir directamente. PDF descargado.','warn');
    }
  }catch(e){
    if(e.name==='AbortError'){
      // Usuario canceló — no mostrar error
      return;
    }
    toast('Error al compartir: '+e.message,'danger');
  }
}

function imprimirOrden(id){
  const o=S.ordenes.find(x=>x.id===id);if(!o)return;
  const html=generarOrdenHTML(o);
  const w=window.open('','_blank');
  if(!w){
    toast('El navegador bloqueó la ventana. Permití pop-ups para esta página.','danger');
    return;
  }
  w.document.write(html);
  w.document.close();
  setTimeout(()=>w.print(),500);
  closeModal();
}

// Mapeo entidad → array en S y nombre legible
const PAPELERA_TIPOS = {
  insumo:       { array:'insumos',      label:'Insumo',              icon:'📦' },
  lote:         { array:'lotes',        label:'Unidad Productiva',   icon:'🗺️' },
  contratista:  { array:'contratistas', label:'Contratista',         icon:'👷' },
  proveedor:    { array:'proveedores',  label:'Proveedor',           icon:'🏢' },
  orden:        { array:'ordenes',      label:'Orden de Trabajo',    icon:'📋' },
};

}

function renderPapelera(){
  const items = S.papelera || [];

  // Agrupar por tipo
  const cards = items.map(item => {
    const tipoInfo = PAPELERA_TIPOS[item.tipo] || { label: item.tipo, icon:'📄' };
    const datos = item.datos;
    let descripcion = '';
    if (item.tipo === 'insumo') descripcion = `${datos.nombre || '—'} ${datos.categoria?'· '+datos.categoria:''}`;
    else if (item.tipo === 'lote') descripcion = `${datos.nombre || '—'} ${datos.establecimiento?'· '+datos.establecimiento:''}`;
    else if (item.tipo === 'contratista') descripcion = `${datos.nombre || '—'} ${datos.servicio?'· '+datos.servicio:''}`;
    else if (item.tipo === 'proveedor') descripcion = `${datos.nombre || '—'} ${datos.ciudad?'· '+datos.ciudad:''}`;
    else if (item.tipo === 'orden') descripcion = `${datos.numero || '—'} · ${datos.contratista || '—'}`;
    else descripcion = JSON.stringify(datos).substring(0, 60);

    return `<div class="card" style="margin-bottom:10px">
      <div class="row-between" style="margin-bottom:6px">
        <div>
          <span style="font-size:12px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.06em">${tipoInfo.icon} ${tipoInfo.label}</span>

      </div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px">

      </div>
      <div class="row" style="gap:6px">

  }).join('');

  return `
    <div class="row-between" style="margin-bottom:16px">
      <h2 style="font-size:18px;font-weight:800">🗑️ Papelera</h2>
      ${items.length>0?`<button class="btn-danger btn-sm" onclick="vaciarPapelera()">🧹 Vaciar todo</button>`:''}
    </div>
    <div style="background:var(--surface);border-radius:8px;padding:10px;font-size:12px;color:var(--muted);margin-bottom:14px">
      💡 Cuando eliminás algo, queda guardado acá. Podés restaurarlo o eliminarlo definitivamente. Los elementos en la papelera no aparecen en los listados normales.
    </div>
    <div class="row" style="margin-bottom:16px;gap:8px">
      <div class="stat"><div class="stat-lbl">Elementos</div><div class="stat-val" style="color:var(--accent)">${items.length}</div></div>
    </div>
    ${cards || '<div style="color:var(--muted);text-align:center;padding:40px;font-size:14px">La papelera está vacía</div>'}`;
}

async function restaurarPapelera(itemId){
  const item = S.papelera.find(x => x.id === itemId);
  if (!item) return;
  const tipoInfo = PAPELERA_TIPOS[item.tipo];
  if (!tipoInfo) return toast('Tipo desconocido','danger');

  const arrayName = tipoInfo.array;
  // Verificar si ya existe uno con ese ID (raro pero por las dudas)
  const existe = (S[arrayName] || []).some(x => x.id === item.datos.id);
  if (existe){
    if (!await confirmar('Ya existe un elemento con el mismo ID. ¿Restaurar de todas formas? Se actualizará el existente.', {textoConfirmar:'Restaurar', tipoConfirmar:'primary'})) return;
    S[arrayName] = (S[arrayName] || []).map(x => x.id === item.datos.id ? item.datos : x);
  } else {
    S[arrayName] = [item.datos, ...(S[arrayName] || [])];
  }

  // Si era una orden, hay que descontar el stock de nuevo (porque al eliminarla lo devolvimos)
  if (item.tipo === 'orden'){
    const o = item.datos;
    const descuentos = {};
    if (o.bloques && o.bloques.length > 0){
      for (const b of o.bloques){
        for (const it of (b.items || [])){
          if (!it.insumoId) continue;
          descuentos[it.insumoId] = (descuentos[it.insumoId] || 0) + Number(it.cantidad);
        }
      }
    } else if (o.items && o.items.length > 0){
      for (const it of o.items){
        if (!it.insumoId) continue;
        descuentos[it.insumoId] = (descuentos[it.insumoId] || 0) + Number(it.cantidad);
      }
    }
    // Verificar stock antes de descontar
    for (const insId in descuentos){
      const ins = S.insumos.find(x => x.id === insId);
      if (!ins) continue;
      if (descuentos[insId] > Number(ins.stockEstab)){
        return toast(`No se puede restaurar: stock insuficiente de ${ins.nombre} (necesita ${fmtN(descuentos[insId])} ${ins.unidad}, hay ${fmtN(ins.stockEstab)})`,'danger');
      }
    }
    // Aplicar descuentos
    S.insumos = S.insumos.map(ins => {
      if (descuentos[ins.id]){
        return { ...ins, stockEstab: Number(ins.stockEstab) - descuentos[ins.id] };
      }
      return ins;
    });
    // Registrar movimientos de descuento por restauración
    for (const insId in descuentos){
      const ins = S.insumos.find(x => x.id === insId);
      if (!ins) continue;
      S.movimientos = [{
        id: uid(),
        fecha: now(),
        insumoId: insId,
        insumoNombre: ins.nombre,
        tipo: 'uso_estab',
        cantidad: descuentos[insId],
        unidad: ins.unidad,
        nota: `Restauración de orden ${o.numero} desde papelera`
      }, ...S.movimientos];
    }
  }

  // Quitar de la papelera
  S.papelera = S.papelera.filter(x => x.id !== itemId);
  saveState();
  render();
  toast('Restaurado ✓');
}

async function eliminarDefinitivo(itemId){
  const item = S.papelera.find(x => x.id === itemId);
  if (!item) return;
  if (!await confirmar('¿Eliminar definitivamente? Esta acción NO se puede deshacer.')) return;
  S.papelera = S.papelera.filter(x => x.id !== itemId);
  saveState();
  render();
  toast('Eliminado definitivamente');
}

async function vaciarPapelera(){
  const count = (S.papelera || []).length;
  if (count === 0) return;
  if (!await confirmar(`¿Vaciar la papelera? Se eliminarán definitivamente ${count} ${count===1?'elemento':'elementos'}. Esta acción NO se puede deshacer.`)) return;
  S.papelera = [];
  saveState();
  render();
  toast('Papelera vaciada');
}

  const nombre=document.getElementById('nu-nombre').value.trim();
  const usuario=document.getElementById('nu-user').value.trim();
  const password=document.getElementById('nu-pass').value;
  const rol=document.getElementById('nu-rol').value;
  if (!nombre||!usuario||!password) return toast('Completá todos los campos','warn');
  if (usuario.includes(' ')) return toast('El usuario no puede tener espacios','warn');
  if (password.length<4) return toast('La contraseña debe tener al menos 4 caracteres','warn');
  try {
    await apiCall('createUser', { nombre, usuario, password, rol });
    // Recargar lista
    const resp = await apiCall('getAll', {});
    S.usuarios = resp.datos.usuarios || [];
    closeModal();
    render();
    toast('Usuario creado ✓');
  } catch (err) { toast(err.message,'danger'); }
}

function editarUsuario(usuario){
  const u = S.usuarios.find(x=>x.usuario===usuario);
  if (!u) return;
  showModal('Editar Usuario',`
    <div class="field"><label>Nombre completo</label><input id="eu-nombre" value="${esc(u.nombre||'')}"></div>
    <div class="field"><label>Usuario</label><input id="eu-user" value="${esc(u.usuario)}" disabled style="opacity:.6"></div>
    <div class="field"><label>Nueva contraseña (dejá en blanco para no cambiarla)</label><input id="eu-pass" type="password" placeholder="••••••"></div>
    <div class="field"><label>Rol</label>
      <select id="eu-rol">
        <option value="user"${u.rol==='user'?' selected':''}>Usuario común</option>
        <option value="admin"${u.rol==='admin'?' selected':''}>Administrador</option>
      </select>
    </div>
    <div class="field"><label>Estado</label>
      <select id="eu-activo">
        <option value="true"${(u.activo===true||u.activo==='sí'||u.activo===undefined||u.activo==='')?' selected':''}>Activo</option>
        <option value="false"${(u.activo===false||u.activo==='no')?' selected':''}>Inactivo (no puede entrar)</option>
      </select>
    </div>
    <div class="row" style="justify-content:flex-end;gap:8px">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="guardarEdicionUsuario('${esc(usuario)}')">Guardar</button>
    </div>`);
}

async function guardarEdicionUsuario(usuario){
  const nombre=document.getElementById('eu-nombre').value.trim();
  const password=document.getElementById('eu-pass').value;
  const rol=document.getElementById('eu-rol').value;
  const activo=document.getElementById('eu-activo').value==='true';
  if (!nombre) return toast('El nombre es obligatorio','warn');
  const datos = { usuario, nombre, rol, activo };
  if (password) {
    if (password.length<4) return toast('La contraseña debe tener al menos 4 caracteres','warn');
    datos.password = password;
  }
  try {
    await apiCall('updateUser', datos);
    const resp = await apiCall('getAll', {});
    S.usuarios = resp.datos.usuarios || [];
    closeModal();
    render();
    toast('Usuario actualizado ✓');
  } catch (err) { toast(err.message,'danger'); }
}

async function eliminarUsuario(usuario){
  if (usuario === SESSION.usuario) return toast('No podés eliminarte a vos mismo','warn');
  if (!await confirmar(`¿Eliminar al usuario "${usuario}"? No podrá acceder más a la app.`)) return;
  try {
    await apiCall('deleteUser', { usuario });
    const resp = await apiCall('getAll', {});
    S.usuarios = resp.datos.usuarios || [];
    render();
    toast('Usuario eliminado');
  } catch (err) { toast(err.message,'danger'); }
}



// ════════════════════════════════════════════════════════════════════
// PANTALLAS DE CONFIGURACIÓN Y LOGIN
// ════════════════════════════════════════════════════════════════════

function boot(){
  // Mostrar indicador de sync en el header
  const header = document.getElementById('header');
  if (header && !document.getElementById('sync-indicator')){
    const span = document.createElement('span');
    span.id = 'sync-indicator';
    span.style.cssText = 'font-size:10px;font-weight:600;margin-left:auto;margin-right:10px;color:var(--muted)';
    span.textContent = '';
    header.appendChild(span);
  }
  // Si no hay URL configurada, pedir
  if (!APP_CFG.webAppUrl){
    pantallaConfig();
    return;
  }
  // Si no hay sesión, login
  if (!SESSION.usuario){
    pantallaLogin();
    return;
  }
  // Si todo está OK, cargar datos
  cargarYRenderizar();
}

function pantallaConfig(){
  document.getElementById('main').innerHTML = `
    <div style="max-width:480px;margin:40px auto;padding:24px">
      <div style="text-align:center;margin-bottom:24px">
        <div style="font-size:48px;margin-bottom:8px">⚙️</div>
        <h2 style="font-size:20px;font-weight:800;margin-bottom:6px">Configuración inicial</h2>
        <p style="color:var(--muted);font-size:13px">Pegá la URL del backend que te pasaron para empezar</p>
      </div>
      <div class="card">
        <div class="field">
          <label>URL del backend (Web App)</label>
          <input id="cfg-url" placeholder="https://script.google.com/macros/s/.../exec" value="${esc(APP_CFG.webAppUrl||'')}">
          <div style="font-size:11px;color:var(--muted);margin-top:6px">Esta URL te la da quien administra el sistema. Se guarda en este dispositivo y solo se pide una vez.</div>
        </div>
        <button class="btn-primary" style="width:100%;margin-top:8px" onclick="guardarConfig()">Guardar y continuar</button>
      </div>
    </div>`;
  // Ocultar nav inferior mientras no hay sesión
  const nav = document.getElementById('bottom-nav');
  if (nav) nav.style.display = 'none';
}

function guardarConfig(){
  const url = document.getElementById('cfg-url').value.trim();
  if (!url) return toast('Ingresá la URL', 'warn');
  if (!url.startsWith('https://')) return toast('La URL debe empezar con https://', 'warn');
  APP_CFG.webAppUrl = url;
  saveConfig(APP_CFG);
  toast('URL guardada ✓');
  boot();
}

function pantallaLogin(){
  document.getElementById('main').innerHTML = `
    <div style="max-width:380px;margin:40px auto;padding:24px">
      <div style="text-align:center;margin-bottom:24px">
        <div style="font-size:48px;margin-bottom:8px">🌱</div>
        <h2 style="font-size:22px;font-weight:800;margin-bottom:4px">CampoGestión</h2>
        <p style="color:var(--muted);font-size:13px">Iniciá sesión para continuar</p>
      </div>
      <div class="card">
        <div class="field">
          <label>Usuario</label>
          <input id="login-user" autocomplete="username" autocapitalize="none">
        </div>
        <div class="field">
          <label>Contraseña</label>
          <input id="login-pass" type="password" autocomplete="current-password">
        </div>
        <button class="btn-primary" id="login-btn" style="width:100%;margin-top:8px" onclick="hacerLogin()">Entrar</button>
        <div style="text-align:center;margin-top:14px">
          <button class="btn-secondary btn-sm" onclick="cambiarUrl()">⚙️ Cambiar URL del backend</button>
        </div>
      </div>
    </div>`;
  const nav = document.getElementById('bottom-nav');
  if (nav) nav.style.display = 'none';
  // Permitir Enter para enviar
  setTimeout(()=>{
    const inp = document.getElementById('login-pass');
    if (inp) inp.addEventListener('keydown', e => { if (e.key==='Enter') hacerLogin(); });
  }, 100);
}

function cambiarUrl(){
  APP_CFG.webAppUrl = '';
  saveConfig(APP_CFG);
  pantallaConfig();
}

async function hacerLogin(){
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  if (!user || !pass) return toast('Completá usuario y contraseña','warn');
  const btn = document.getElementById('login-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Verificando...'; }
  try {
    SESSION.usuario = user;
    SESSION.password = pass;
    const resp = await apiCall('login', {});
    SESSION.nombre = resp.nombre;
    SESSION.rol = resp.rol;
    toast('Bienvenido, '+SESSION.nombre+' ✓');
    cargarYRenderizar();
  } catch (err) {
    SESSION = { usuario:null, password:null, nombre:null, rol:null };
    toast(err.message, 'danger');
    if (btn) { btn.disabled = false; btn.textContent = 'Entrar'; }
  }
}

function cerrarSesion(){
  SESSION = { usuario:null, password:null, nombre:null, rol:null };
  // Vaciamos S para no dejar datos en memoria
  S = JSON.parse(JSON.stringify(INIT));
  toast('Sesión cerrada');
  boot();
}

async function cargarYRenderizar(){
  document.getElementById('main').innerHTML = `
    <div style="text-align:center;padding:60px 20px;color:var(--muted)">
      <div style="font-size:32px;margin-bottom:10px">⏳</div>
      <div>Cargando datos...</div>
    </div>`;
  try {
    const resp = await apiCall('getAll', {});
    // Pasar los datos del backend al estado S
    S = {
      ...INIT,
      ...resp.datos,
      // Asegurar que los arrays existen aunque vengan vacíos
      categorias: resp.datos.categorias || [],
      unidades: resp.datos.unidades || [],
      establecimientos: resp.datos.establecimientos || [],
      tiposUP: resp.datos.tiposUP || [],
      unidadesUP: resp.datos.unidadesUP || [],
      servicios: resp.datos.servicios || [],
      proveedores: resp.datos.proveedores || [],
      papelera: resp.datos.papelera || [],
      insumos: resp.datos.insumos || [],
      lotes: resp.datos.lotes || [],
      contratistas: resp.datos.contratistas || [],
      ordenes: resp.datos.ordenes || [],
      movimientos: resp.datos.movimientos || [],
      facturas: resp.datos.compras || [],   // mapeo nombre interno
      remitos: resp.datos.remitos || [],
      usuarios: resp.datos.usuarios || [],
    };
    // Inicializar snapshot ANTES de migrar (así los proveedores migrados se sincronizan al backend)
    LAST_SYNC = JSON.parse(JSON.stringify(snapshotEstado(S)));
    // Migración: si la lista de proveedores está vacía, la generamos a partir de los insumos
    if (S.proveedores.length === 0 && S.insumos.length > 0){
      const nombresUnicos = new Set();
      S.insumos.forEach(i => {
        const nom = (i.proveedor||'').trim();
        if (nom) nombresUnicos.add(nom);
      });
      (S.facturas||[]).forEach(f => {
        const nom = (f.proveedor||'').trim();
        if (nom && !nom.startsWith('Salida')) nombresUnicos.add(nom);
      });
      if (nombresUnicos.size > 0){
        S.proveedores = [...nombresUnicos].map(nombre => ({
          id: uid(),
          nombre,
          ciudad: '',
          provincia: ''
        }));
        // Disparar sync para guardar los proveedores migrados al backend
        saveState();
      }
    }
    // Mostrar nav y renderizar
    const nav = document.getElementById('bottom-nav');
    if (nav) nav.style.display = 'flex';
    // Si el rol no es admin, ocultar la pestaña de usuarios
    actualizarVisibilidadAdmin();
    render();
    actualizarHeaderUsuario();
  } catch (err) {
    document.getElementById('main').innerHTML = `
      <div style="text-align:center;padding:60px 20px">
        <div style="font-size:32px;margin-bottom:10px">⚠️</div>
        <div style="color:var(--danger);margin-bottom:18px">Error al cargar: ${esc(err.message)}</div>
        <button class="btn-primary" onclick="cargarYRenderizar()">Reintentar</button>
        <div style="margin-top:10px"><button class="btn-secondary btn-sm" onclick="cerrarSesion()">Cerrar sesión</button></div>
      </div>`;
  }
}

function actualizarVisibilidadAdmin(){
  const btn = document.querySelector('.nav-btn[data-tab="usuarios"]');
  if (btn){
    btn.style.display = (SESSION.rol === 'admin') ? '' : 'none';
  }
}

function actualizarHeaderUsuario(){
  const header = document.getElementById('header');
  if (!header) return;
  let userBox = document.getElementById('user-box');
  if (!userBox){
    userBox = document.createElement('div');
    userBox.id = 'user-box';
    userBox.style.cssText = 'display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted)';
    header.appendChild(userBox);
  }
  userBox.innerHTML = `
    <span style="font-weight:700;color:var(--text)">${esc(SESSION.nombre||SESSION.usuario)}</span>
    <button class="btn-sm btn-secondary" style="padding:4px 8px;font-size:10px" onclick="menuUsuario()">⚙️</button>`;
}

function menuUsuario(){
  showModal('Mi sesión',`
    <div style="margin-bottom:14px;font-size:13px">
      <div style="color:var(--muted);font-size:11px;text-transform:uppercase">Usuario</div>
      <div style="font-weight:700">${esc(SESSION.nombre||SESSION.usuario)} <span style="color:var(--muted);font-weight:400">(${esc(SESSION.usuario)})</span></div>
      <div style="color:var(--muted);font-size:11px;margin-top:8px;text-transform:uppercase">Rol</div>
      <div style="font-weight:700">${SESSION.rol==='admin'?'Administrador':'Usuario'}</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn-secondary" onclick="closeModal();abrirCambiarPassword()">🔑 Cambiar contraseña</button>
      <button class="btn-primary" onclick="closeModal();cargarYRenderizar()">🔄 Recargar datos</button>
      <button class="btn-danger" onclick="closeModal();cerrarSesion()">🚪 Cerrar sesión</button>
    </div>`);
}

function abrirCambiarPassword(){
  showModal('Cambiar contraseña',`
    <div class="field"><label>Contraseña actual</label><input id="pwd-actual" type="password"></div>
    <div class="field"><label>Contraseña nueva</label><input id="pwd-nueva" type="password"></div>
    <div class="field"><label>Repetir contraseña nueva</label><input id="pwd-rep" type="password"></div>
    <div class="row" style="justify-content:flex-end;gap:8px">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="cambiarPassword()">Guardar</button>
    </div>`);
}

async function cambiarPassword(){
  const a = document.getElementById('pwd-actual').value;
  const n = document.getElementById('pwd-nueva').value;
  const r = document.getElementById('pwd-rep').value;
  if (!a||!n||!r) return toast('Completá todos los campos','warn');
  if (n!==r) return toast('Las contraseñas nuevas no coinciden','warn');
  if (n.length<4) return toast('La contraseña nueva debe tener al menos 4 caracteres','warn');
  try {
    await apiCall('changePassword', { passwordActual:a, passwordNueva:n });
    SESSION.password = n;
    toast('Contraseña actualizada ✓');
    closeModal();
  } catch (err) { toast(err.message,'danger'); }
}
// ── Init ──────────────────────────────────────────────────────────────────────
boot();

</script>
